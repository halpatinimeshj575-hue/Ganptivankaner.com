<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>श्री प्रगति गणेश युवक मंडल - लाइव ऐप</title>
    
    <!-- PWA App Coding (मोबाइल ऐप सेटअप) -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"श्री प्रगति गणेश मंडल ऐप","short_name":"गणेश मंडल","start_url":"./","display":"standalone","background_color":"%23f3f4f6","theme_color":"%23ea580c","orientation":"portrait"}'>
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- Tailwind CSS & FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans text-gray-800 antialiased">

    <!-- App Header -->
    <header class="bg-orange-600 text-white text-center py-5 shadow-md sticky top-0 z-10">
        <h1 class="text-2xl font-bold tracking-wide">🙏 श्री प्रगति गणेश युवक मंडल 🙏</h1>
        <p class="text-orange-200 text-xs mt-1" id="sync-status">🔄 लाइव क्लाउड सर्वर से कनेक्ट हो रहा है...</p>
    </header>

    <div class="max-w-4xl mx-auto p-4 pb-20">
        
        <!-- Year Selector -->
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-col sm:flex-row items-center justify-between gap-4 border-l-4 border-orange-500">
            <div class="w-full sm:w-auto">
                <label class="text-xs font-bold text-gray-500 uppercase block mb-1">उत्सव का वर्ष</label>
                <div class="flex gap-2">
                    <input type="number" id="year-input" value="2026" min="2025" max="2999" class="w-32 bg-orange-50 border border-orange-300 text-orange-700 font-bold py-2 px-3 rounded-lg text-lg">
                    <button onclick="changeYear()" class="bg-orange-600 text-white font-bold px-4 py-2 rounded-lg text-sm cursor-pointer">बदलें</button>
                </div>
            </div>
            <div class="text-center sm:text-right">
                <span class="text-sm font-semibold text-gray-500">वर्ष <span id="display-year">2026</span> का बजट</span>
                <p class="text-2xl font-black text-green-600">● ऑनलाइन लाइव</p>
            </div>
        </div>

        <!-- Dashboard Summary Boxes -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
            <div class="bg-white p-3 rounded-xl shadow-sm border-b-4 border-orange-500 text-center">
                <p class="text-[10px] text-gray-500 font-semibold uppercase">कुल सदस्य</p>
                <p class="text-lg font-bold text-gray-800" id="total-members-count">5</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border-b-4 border-green-500 text-center">
                <p class="text-[10px] text-gray-500 font-semibold uppercase">जमा वाले</p>
                <p class="text-lg font-bold text-green-600" id="paid-count">0</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border-b-4 border-blue-500 text-center">
                <p class="text-[10px] text-gray-500 font-semibold uppercase">कुल चंदा</p>
                <p class="text-lg font-bold text-blue-600" id="total-collection">₹0</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border-b-4 border-red-500 text-center">
                <p class="text-[10px] text-gray-500 font-semibold uppercase">कुल खर्च</p>
                <p class="text-lg font-bold text-red-600" id="total-expenses">₹0</p>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border-b-4 border-purple-500 text-center col-span-2 md:col-span-1">
                <p class="text-[10px] text-gray-500 font-semibold uppercase">बचे पैसे (कैश)</p>
                <p class="text-lg font-bold text-purple-600" id="net-balance">₹0</p>
            </div>
        </div>

        <!-- Search & Filters -->
        <div class="bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-col md:flex-row gap-3 items-center justify-between">
            <div class="relative w-full md:w-72">
                <input type="text" id="search-input" placeholder="सदस्य का नाम खोजें..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
            </div>
            <div class="flex gap-2">
                <button onclick="filterMembers('all')" id="btn-all" class="px-4 py-2 rounded-lg text-sm font-medium bg-orange-600 text-white">सभी</button>
                <button onclick="filterMembers('paid')" id="btn-paid" class="px-4 py-2 rounded-lg text-sm font-medium bg-gray-200 text-gray-700">जमा</button>
                <button onclick="filterMembers('pending')" id="btn-pending" class="px-4 py-2 rounded-lg text-sm font-medium bg-gray-200 text-gray-700">बाकी</button>
            </div>
        </div>

        <!-- Members List -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-6">
            <div class="p-4 bg-gray-50 font-bold border-b text-gray-700 flex justify-between items-center">
                <span>📊 सदस्यवार चंदा विवरण (किसने कितना दिया)</span>
            </div>
            <div id="members-list" class="divide-y divide-gray-100 max-h-[350px] overflow-y-auto"></div>
        </div>

        <!-- Expense Section -->
        <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-6 border border-red-100">
            <div class="p-4 bg-red-50 border-b border-red-100 flex justify-between items-center">
                <h3 class="font-bold text-red-800"><i class="fa-solid fa-wallet mr-1"></i> 💸 खर्चों का पूरा विवरण (कहाँ-कहाँ खर्च हुए)</h3>
                <button onclick="addExpense()" class="bg-red-600 text-white text-xs px-3 py-1.5 rounded-lg font-bold">
                    <i class="fa-solid fa-plus mr-1"></i> नया खर्च जोड़ें
                </button>
            </div>
            <div id="expenses-list" class="divide-y divide-gray-100 max-h-[250px] overflow-y-auto"></div>
        </div>

        <!-- Controls -->
        <div class="bg-amber-50 p-4 rounded-xl border border-amber-200 text-center space-y-4 mb-10">
            <h3 class="text-sm font-bold text-amber-800">⚙️ एडमिन स्पेशल कंट्रोल पैनल</h3>
            <div class="flex flex-wrap gap-2 justify-center">
                <button onclick="addNewMember()" class="bg-green-600 text-white text-xs px-4 py-2 rounded-lg">नया सदस्य जोड़ें</button>
                <button onclick="editMemberName()" class="bg-amber-600 text-white text-xs px-4 py-2 rounded-lg">नाम सुधारें</button>
                <button onclick="forceSync()" class="bg-blue-600 text-white text-xs px-4 py-2 rounded-lg"><i class="fa-solid fa-cloud-arrow-up"></i> तुरंत क्लाउड सिंक करें</button>
            </div>
        </div>
    </div>

    <script>
        // 🔐 परमानेंट नो-टोकन क्लाउड डेटाबेस (यह कभी ब्लॉक नहीं होगा)
        const CLOUD_DATABASE_URL = "https://api.keyvalue.xyz/v1/7d3a8e2b9c5f4a1b8e6d2c3f4a5b6c7d/mandalData";

        const ADMIN_PASSWORD = "9680"; 
        let mandalData = {
            memberNames: {"m1": "निमेष हलपति", "m2": "राहुल भाई", "m3": "रोहन पटेल", "m4": "निर्मल कुमार", "m5": "कार्तिक हलपति"},
            years: {"2026": {collections: {}, expenses: []}}
        };

        let currentYear = "2026";
        let currentFilter = 'all';
        let searchQuery = '';

        // सर्वर से लाइव डेटा लोड करना
        async function loadDataFromGitHub() {
            document.getElementById('sync-status').innerText = "🔄 लाइव डेटाबेस से कनेक्ट हो रहा है...";
            try {
                const response = await fetch(CLOUD_DATABASE_URL);
                if (response.ok) {
                    const res = await response.text();
                    if(res && res.trim() !== "") {
                        mandalData = JSON.parse(res);
                        document.getElementById('sync-status').innerText = "✅ लाइव हिसाब अपडेटेड है!";
                    } else {
                        await saveDataToGitHub();
                    }
                } else {
                    await saveDataToGitHub(); 
                }
            } catch (err) {
                if(localStorage.getItem('mandal_backup')) {
                    mandalData = JSON.parse(localStorage.getItem('mandal_backup'));
                    document.getElementById('sync-status').innerText = "✅ ऑफलाइन बैकअप से लोडेड";
                } else {
                    document.getElementById('sync-status').innerText = "❌ कनेक्शन एरर!";
                }
            }
            refreshAll();
        }

        // सर्वर पर डेटा पक्का सेव करना
        async function saveDataToGitHub() {
            document.getElementById('sync-status').innerText = "📤 क्लाउड पर लाइव सेव हो रहा है...";
            localStorage.setItem('mandal_backup', JSON.stringify(mandalData));
            
            try {
                const response = await fetch(CLOUD_DATABASE_URL, {
                    method: "POST",
                    body: JSON.stringify(mandalData)
                });
                
                if(response.ok) {
                    document.getElementById('sync-status').innerText = "✅ फेसबुक की तरह सबको तुरंत दिखेगा!";
                } else {
                    document.getElementById('sync-status').innerText = "⚠️ सर्वर व्यस्त है, फोन में सुरक्षित है!";
                }
            } catch (err) {
                document.getElementById('sync-status').innerText = "✅ फोन मेमोरी में परमानेंट सुरक्षित सेव्ड!";
            }
        }

        function changeYear() {
            const yrInput = document.getElementById('year-input').value;
            if(yrInput >= 2025 && yrInput <= 2999) {
                currentYear = yrInput.toString();
                document.getElementById('display-year').innerText = currentYear;
                if (!mandalData.years[currentYear]) mandalData.years[currentYear] = { collections: {}, expenses: [] };
                refreshAll();
            }
        }

        function refreshAll() {
            const yearData = mandalData.years[currentYear] || { collections: {}, expenses: [] };
            const totalMembers = Object.keys(mandalData.memberNames).length;
            let paidCount = 0, totalAmt = 0;

            Object.keys(mandalData.memberNames).forEach(id => {
                const statusData = yearData.collections[id];
                if (statusData && statusData.status === 'paid') { paidCount++; totalAmt += parseInt(statusData.amount || 0); }
            });

            let totalExp = 0;
            if (yearData.expenses) yearData.expenses.forEach(e => totalExp += parseInt(e.amount || 0));
            let netBal = totalAmt - totalExp;

            document.getElementById('total-members-count').innerText = totalMembers;
            document.getElementById('paid-count').innerText = paidCount;
            document.getElementById('total-collection').innerText = `₹${totalAmt}`;
            document.getElementById('total-expenses').innerText = `₹${totalExp}`;
            document.getElementById('net-balance').innerText = `₹${netBal}`;

            const listContainer = document.getElementById('members-list');
            listContainer.innerHTML = '';
            Object.keys(mandalData.memberNames).forEach(id => {
                const name = mandalData.memberNames[id];
                const statusData = yearData.collections[id] || { status: 'pending', amount: 0 };
                if (name.toLowerCase().includes(searchQuery.toLowerCase()) && (currentFilter === 'all' || statusData.status === currentFilter)) {
                    const item = document.createElement('div');
                    item.className = "p-4 flex justify-between items-center text-sm border-b border-gray-100 hover:bg-gray-50";
                    
                    let badge = statusData.status === 'paid' 
                        ? `<span class='text-green-600 font-bold bg-green-50 px-3 py-1 rounded-full'>₹${statusData.amount} जमा</span>` 
                        : `<button onclick="markAsPaid('${id}')" class='bg-yellow-100 text-yellow-700 font-bold px-3 py-1 rounded-full text-xs cursor-pointer hover:bg-yellow-200'>💸 पेंडिंग (जमा करें)</button>`;
                    
                    item.innerHTML = `<div><span class="text-gray-400 font-bold mr-2">${id.toUpperCase()}</span> <span class="font-medium text-gray-800">${name}</span></div><div>${badge}</div>`;
                    listContainer.appendChild(item);
                }
            });

            const expContainer = document.getElementById('expenses-list');
            expContainer.innerHTML = '';
            if(yearData.expenses && yearData.expenses.length > 0) {
                yearData.expenses.forEach((exp, idx) => {
                    const item = document.createElement('div');
                    item.className = "p-4 flex justify-between items-center text-sm border-b border-gray-100 hover:bg-red-50";
                    item.innerHTML = `<div><button onclick="deleteExpense(${idx})" class='text-red-500 mr-3 cursor-pointer hover:text-red-700'><i class="fa-solid fa-trash-can"></i></button><span class="font-medium text-gray-700">${exp.title}</span></div><div class='text-red-600 font-black bg-red-50 px-3 py-1 rounded-full'>₹${exp.amount}</div>`;
                    expContainer.appendChild(item);
                });
            } else {
                expContainer.innerHTML = `<div class="p-6 text-center text-gray-400 text-xs"><i class="fa-solid fa-receipt block text-lg mb-2"></i>कोई खर्च दर्ज नहीं है</div>`;
            }
        }

        async function markAsPaid(id) {
            const pass = prompt("एडमिन पासवर्ड डालें:");
            if (pass === ADMIN_PASSWORD) {
                const amt = prompt("चंदा राशि दर्ज करें (₹):", "500");
                if (amt && !isNaN(amt)) {
                    mandalData.years[currentYear].collections[id] = { status: 'paid', amount: parseInt(amt) };
                    refreshAll();
                    await saveDataToGitHub(); 
                }
            } else if (pass !== null) alert("गलत पासवर्ड!");
        }

        async function addExpense() {
            const pass = prompt("एडमिन पासवर्ड डालें:");
            if (pass === ADMIN_PASSWORD) {
                const title = prompt("खर्च का विवरण (किस चीज में खर्च हुआ):");
                const amt = prompt("खर्च की रकम (₹):");
                if (title && amt && !isNaN(amt)) {
                    mandalData.years[currentYear].expenses.push({ title, amount: parseInt(amt) });
                    refreshAll();
                    await saveDataToGitHub(); 
                }
            } else if (pass !== null) alert("गलत पासवर्ड!");
        }

        async function deleteExpense(idx) {
            if (prompt("हटाने के लिए पासवर्ड डालें:") === ADMIN_PASSWORD) {
                mandalData.years[currentYear].expenses.splice(idx, 1);
                refreshAll();
                await saveDataToGitHub();
            } else { alert("गलत पासवर्ड!"); }
        }

        async function addNewMember() {
            if (prompt("नया सदस्य जोड़ने के लिए पासवर्ड:") === ADMIN_PASSWORD) {
                const name = prompt("नए मंडल सदस्य का पूरा नाम लिखें:");
                if (name) {
                    const nextId = `m${Object.keys(mandalData.memberNames).length + 1}`;
                    mandalData.memberNames[nextId] = name;
                    refreshAll();
                    await saveDataToGitHub();
                }
            } else { alert("गलत पासवर्ड!"); }
        }

        async function editMemberName() {
            if (prompt("नाम सुधारने के लिए पासवर्ड डालें:") === ADMIN_PASSWORD) {
                const id = prompt("सदस्य की ID दर्ज करें (जैसे: m1, m2):");
                if(id && mandalData.memberNames[id]) {
                    const newName = prompt("सही नाम दर्ज करें:", mandalData.memberNames[id]);
                    if(newName) {
                        mandalData.memberNames[id] = newName;
                        refreshAll();
                        await saveDataToGitHub();
                    }
                } else if(id) { alert("गलत ID!"); }
            } else { alert("गलत पासवर्ड!"); }
        }

        function forceSync() { saveDataToGitHub(); }
        function filterMembers(type) { 
            currentFilter = type; 
            ['all', 'paid', 'pending'].forEach(t => {
                const btn = document.getElementById(`btn-${t}`);
                if(t === type) { btn.className = "px-4 py-2 rounded-lg text-sm font-medium bg-orange-600 text-white"; }
                else { btn.className = "px-4 py-2 rounded-lg text-sm font-medium bg-gray-200 text-gray-700"; }
            });
            refreshAll(); 
        }
        document.getElementById('search-input').addEventListener('input', (e) => { searchQuery = e.target.value; refreshAll(); });

        // डेटाबेस लोड शुरू करें
        loadDataFromGitHub();
    </script>
</body>
</html>
